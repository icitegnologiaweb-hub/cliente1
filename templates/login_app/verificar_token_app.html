<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Token</title>
<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center px-4"
style="background:
radial-gradient(circle at top, #143b63 0%, #081e33 55%, #050f1c 100%);">

<div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-lg">

    <h2 class="text-xl font-bold text-center mb-6 text-gray-800">
        Verificar Token
    </h2>

    <form method="POST" class="space-y-6">

        <div>
            <label class="block text-sm mb-2 text-gray-500">
                Código de verificación
            </label>

            <input type="text"
                   name="token"
                   required
                   class="w-full border rounded-xl p-4 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-800">
        </div>

        <button type="submit"
            class="w-full bg-gray-900 text-white p-4 rounded-xl font-semibold hover:bg-gray-800 transition">
            Validar
        </button>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="text-sm text-center mt-4
                        {% if category == 'error' %} text-red-500 {% else %} text-green-500 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    </form>

</div>

</body>
</html>
