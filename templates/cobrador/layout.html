<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">

<style>
body {
    background:
        radial-gradient(circle at top, #143b63 0%, #081e33 55%, #050f1c 100%);
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    position: fixed;
    top: 0;
    left: -280px;
    width: 260px;
    height: 100%;
    background: linear-gradient(180deg, #173c63, #0c2440);
    box-shadow: 5px 0 20px rgba(0,0,0,.5);
    transition: .3s ease;
    z-index: 1000;
    padding: 20px;
}

.sidebar.active {
    left: 0;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    z-index: 999;
}

.overlay.active {
    display: block;
}

/* Menu Items */
.menu-item {
    background: rgba(255,255,255,.05);
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 12px;
    transition: .2s;
}

.menu-item:hover {
    background: rgba(255,255,255,.1);
}
</style>

</head>

<body class="text-white">

<!-- Sidebar -->
<div id="sidebar" class="sidebar">

    <!-- User Info -->
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-3">
            <div class="bg-green-600 px-3 py-1 rounded-lg text-xs font-bold">
                PRO
            </div>
        </div>

        <div class="font-semibold text-sm">
            {{ session.nombre }}
        </div>

        <div class="text-xs opacity-70 mt-1">
            {{ session.get('email','') }}
        </div>
    </div>

    <!-- Menu -->
    <!-- Menu -->
<div class="space-y-3">

    <a href="{{ url_for('dashboard_cobrador') }}" class="flex items-center gap-3 menu-item">
        <!-- Ventas -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M3 3v18h18M9 17V9m4 8V5m4 12v-6"/>
        </svg>
        <span>Todas las ventas</span>
    </a>

    <a href="#" class="flex items-center gap-3 menu-item">
        <!-- Caja -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M3 7h18M5 7v10h14V7M9 11h6"/>
        </svg>
        <span>Caja</span>
    </a>

    <a href="#" class="flex items-center gap-3 menu-item">
        <!-- Clientes -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M17 20h5V4H2v16h5m10 0a4 4 0 00-8 0m8 0H9"/>
        </svg>
        <span>Clientes</span>
    </a>

    <a href="#" class="flex items-center gap-3 menu-item">
        <!-- Liquidación -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M12 8c-3 0-5 1.5-5 4s2 4 5 4 5-1.5 5-4-2-4-5-4z"/>
        </svg>
        <span>Liquidación</span>
    </a>

    <a href="#" class="flex items-center gap-3 menu-item">
        <!-- Metas -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M12 6v6l4 2"/>
        </svg>
        <span>Metas del día</span>
    </a>

    <a href="#" class="flex items-center gap-3 menu-item">
        <!-- Configuración -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M11.983 13.983a2 2 0 100-3.966 2 2 0 000 3.966z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M19.4 15a7.5 7.5 0 000-6l2.1-1.6-2-3.5-2.6 1a7.5 7.5 0 00-5-2l-.4-3H9l-.4 3a7.5 7.5 0 00-5 2l-2.6-1-2 3.5L1.6 9a7.5 7.5 0 000 6L-.5 16.6l2 3.5 2.6-1a7.5 7.5 0 005 2l.4 3h4l.4-3a7.5 7.5 0 005-2l2.6 1 2-3.5L19.4 15z"/>
        </svg>
        <span>Configuración</span>
    </a>

</div>

</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- Top Bar -->
<div class="max-w-md mx-auto p-4 flex justify-between items-center">

    <button onclick="toggleMenu()" class="text-2xl">
        ☰
    </button>

    <div class="font-semibold">
        {% block titulo %}{% endblock %}
    </div>

    <div>
        🔍
    </div>

</div>

<!-- Page Content -->
<div class="max-w-md mx-auto px-4 pb-20">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
